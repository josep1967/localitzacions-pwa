<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWA Localitzacions</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <header>
    <h1>Localizaciones</h1>
  </header>

  <main>
    <input id="buscador" type="text" placeholder="Escribe para buscar..." autocomplete="off">

    <div id="resultats"></div>

    <div id="detall" class="ocult">
      <h2 id="detall-nom"></h2>
      <p><strong>Latitud:</strong> <span id="detall-lat"></span></p>
      <p><strong>Longitud:</strong> <span id="detall-lon"></span></p>
      <button id="tancar-detall">Cerrar</button>
    </div>
  </main>

  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>

</body>
</html>
